name: Deploy to Firebase App Distribution

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Signing Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      - name: Set Version Information
        id: versioning
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Calculated Version Code: $VERSION_CODE"
          echo "Calculated Version Name: $VERSION_NAME"

      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'mdfinance123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'mdfinance123' }}
        run: |
          gradle assembleRelease \
            -PversionCode=${{ steps.versioning.outputs.version_code }} \
            -PversionName=${{ steps.versioning.outputs.version_name }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          file: app/build/outputs/apk/release/app-release.apk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Upload APK to Firebase Storage & Update RTDB
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VERSION_CODE: ${{ steps.versioning.outputs.version_code }}
          VERSION_NAME: ${{ steps.versioning.outputs.version_name }}
        run: |
          npm install firebase-admin
          node -e "
          const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            storageBucket: 'md-finance-2007.firebasestorage.app',
            databaseURL: 'https://collection-app-2007-default-rtdb.asia-southeast1.firebasedatabase.app'
          });
          
          const bucket = admin.storage().bucket();
          const db = admin.database();
          const versionCode = parseInt(process.env.VERSION_CODE);
          const versionName = process.env.VERSION_NAME;
          const apkPath = 'app/build/outputs/apk/release/app-release.apk';
          const destination = 'updates/app-release-' + versionCode + '.apk';
          const token = require('crypto').randomUUID();
          
          bucket.upload(apkPath, {
            destination: destination,
            metadata: {
              metadata: {
                firebaseStorageDownloadTokens: token
              }
            }
          }).then((data) => {
            const file = data[0];
            const downloadUrl = 'https://firebasestorage.googleapis.com/v0/b/' + bucket.name + '/o/' + encodeURIComponent(file.name) + '?alt=media&token=' + token;
            console.log('Uploaded APK to: ' + downloadUrl);
            
            return db.ref('update_config').set({
              versionId: versionCode,
              versionName: versionName,
              apkFileId: downloadUrl
            });
          }).then(() => {
            console.log('Firebase RTDB updated successfully.');
            process.exit(0);
          }).catch((err) => {
            console.error('Error:', err);
            process.exit(1);
          });
          "
