name: Deploy to Firebase App Distribution

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Signing Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      - name: Set Version Information
        id: versioning
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Calculated Version Code: $VERSION_CODE"
          echo "Calculated Version Name: $VERSION_NAME"

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'mdfinance123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'mdfinance123' }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ steps.versioning.outputs.version_code }} \
            -PversionName=${{ steps.versioning.outputs.version_name }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload APK to Firebase Storage
        run: |
          VERSION_CODE="${{ steps.versioning.outputs.version_code }}"
          gsutil cp app/build/outputs/apk/release/app-release.apk gs://md-finance-2007.firebasestorage.app/mdfinance-update-$VERSION_CODE.apk
          gsutil acl ch -u AllUsers:R gs://md-finance-2007.firebasestorage.app/mdfinance-update-$VERSION_CODE.apk
          echo "APK successfully hosted: https://storage.googleapis.com/md-finance-2007.firebasestorage.app/mdfinance-update-$VERSION_CODE.apk"

      - name: Update Firebase Realtime Database Update Config
        run: |
          VERSION_CODE="${{ steps.versioning.outputs.version_code }}"
          VERSION_NAME="${{ steps.versioning.outputs.version_name }}"
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          
          curl -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"versionId\": $VERSION_CODE, \"versionName\": \"$VERSION_NAME\", \"apkFileId\": \"https://storage.googleapis.com/md-finance-2007.firebasestorage.app/mdfinance-update-$VERSION_CODE.apk\"}" \
            "https://collection-app-2007-default-rtdb.asia-southeast1.firebasedatabase.app/update_config.json"
          
          echo "Firebase RTDB config updated."

      - name: Upload to Firebase App Distribution
        uses: FirebaseExtended/action-firebase-distribution@v3
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk
