name: Deploy to Firebase App Distribution

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Signing Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      - name: Set Version Information
        id: versioning
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Calculated Version Code: $VERSION_CODE"
          echo "Calculated Version Name: $VERSION_NAME"

      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'mdfinance123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'mdfinance123' }}
        run: |
          gradle assembleRelease \
            -PversionCode=${{ steps.versioning.outputs.version_code }} \
            -PversionName=${{ steps.versioning.outputs.version_name }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload APK to Firebase Storage
        run: |
          VERSION_CODE="${{ steps.versioning.outputs.version_code }}"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          
          if gsutil ls gs://md-finance-2007.firebasestorage.app >/dev/null 2>&1; then
            BUCKET="gs://md-finance-2007.firebasestorage.app"
            URL_PREFIX="https://storage.googleapis.com/md-finance-2007.firebasestorage.app"
          elif gsutil ls gs://md-finance-2007.appspot.com >/dev/null 2>&1; then
            BUCKET="gs://md-finance-2007.appspot.com"
            URL_PREFIX="https://storage.googleapis.com/md-finance-2007.appspot.com"
          else
            echo "ERROR: Firebase Storage bucket not found."
            echo "Please go to Firebase Console -> Build -> Storage and click 'Get Started' to initialize the bucket."
            exit 1
          fi
          
          gsutil cp $APK_PATH $BUCKET/mdfinance-update-$VERSION_CODE.apk
          gsutil acl ch -u AllUsers:R $BUCKET/mdfinance-update-$VERSION_CODE.apk
          
          DOWNLOAD_URL="$URL_PREFIX/mdfinance-update-$VERSION_CODE.apk"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "APK successfully hosted: $DOWNLOAD_URL"

      - name: Update Firebase Realtime Database Update Config
        run: |
          VERSION_CODE="${{ steps.versioning.outputs.version_code }}"
          VERSION_NAME="${{ steps.versioning.outputs.version_name }}"
          ACCESS_TOKEN=$(gcloud auth print-access-token)
          
          curl -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"versionId\": $VERSION_CODE, \"versionName\": \"$VERSION_NAME\", \"apkFileId\": \"$DOWNLOAD_URL\"}" \
            "https://collection-app-2007-default-rtdb.asia-southeast1.firebasedatabase.app/update_config.json"
          
          echo "Firebase RTDB config updated."

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.0
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          file: app/build/outputs/apk/release/app-release.apk
