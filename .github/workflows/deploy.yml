name: Deploy to Firebase App Distribution

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Signing Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks

      - name: Set Version Information
        id: versioning
        run: |
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Calculated Version Code: $VERSION_CODE"
          echo "Calculated Version Name: $VERSION_NAME"

      - name: Build Signed Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'mdfinance123' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'mdfinance123' }}
        run: |
          gradle assembleRelease \
            -PversionCode=${{ steps.versioning.outputs.version_code }} \
            -PversionName=${{ steps.versioning.outputs.version_name }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.versioning.outputs.version_name }}
          name: Release v${{ steps.versioning.outputs.version_name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Update RTDB with GitHub Release Link
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VERSION_CODE: ${{ steps.versioning.outputs.version_code }}
          VERSION_NAME: ${{ steps.versioning.outputs.version_name }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          npm install firebase-admin
          node -e "
          const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount),
            databaseURL: 'https://collection-app-2007-default-rtdb.asia-southeast1.firebasedatabase.app'
          });
          
          const db = admin.database();
          const versionCode = parseInt(process.env.VERSION_CODE);
          const versionName = process.env.VERSION_NAME;
          const downloadUrl = 'https://github.com/' + process.env.GITHUB_REPO + '/releases/download/v' + versionName + '/app-release.apk';
          
          db.ref('update_config').set({
            versionid: versionCode,
            versionId: versionCode,
            versionName: versionName,
            apkFileId: downloadUrl
          }).then(() => {
            console.log('Firebase RTDB updated successfully with GitHub link: ' + downloadUrl);
            process.exit(0);
          }).catch((err) => {
            console.error('Error:', err);
            process.exit(1);
          });
          "
